_min_copier_version: "9.0.0"
_subdirectory: "template"
_answers_file: ".copier-answers.yml"
_templates_suffix: ""

_exclude:
  - "{% if not include_frontend %}apps{% endif %}"
  - "{% if not include_frontend %}**/frontend.mdc{% endif %}"
  - "{% if not include_frontend %}**/.github/workflows/deploy-frontend.yml{% endif %}"
  - "{% if not include_infra %}infra{% endif %}"
  - "{% if not include_infra %}**/scripts/deploy{% endif %}"
  - "{% if not include_infra %}**/.github/workflows/deploy-backend.yml{% endif %}"
  - "{% if metadata_store != 'dynamodb' %}**/tests/integration/helpers/dynamodb.py{% endif %}"
  - "{% if metadata_store != 'dynamodb' %}**/infra/cdk/constructs/monitored_table.py{% endif %}"
  - "{% if not include_observability %}observability{% endif %}"
  - "{% if not include_security %}security{% endif %}"
  - "{% if not include_evals %}evals{% endif %}"
  - "{% if not include_e2e_tests %}**/apps/web/e2e{% endif %}"
  - "{% if not include_e2e_tests %}**/scripts/e2e-*{% endif %}"
  - "{% if not include_e2e_tests %}**/docs/testing-e2e.md{% endif %}"
  - "{% if not include_e2e_tests %}.nvmrc{% endif %}"
  - "{% if not include_e2e_tests %}**/.github/workflows/e2e.yml{% endif %}"

project_name:
  type: str
  help: "Human-readable project name (e.g., 'My Knowledge Assistant')"

project_slug:
  type: str
  help: "Python package name (snake_case, e.g., 'my_assistant')"
  default: "{{ project_name | lower | replace(' ', '_') | replace('-', '_') }}"
  validator: "{% if not (project_slug | regex_search('^[a-z][a-z0-9_]*$')) %}Must be a valid Python identifier (lowercase, underscores, no leading digits){% endif %}"

project_description:
  type: str
  help: "One-line project description"
  default: ""

github_org:
  type: str
  help: "GitHub organization or username"

github_team_slug:
  type: str
  help: "GitHub team slug for CODEOWNERS (e.g., 'core-team')"
  default: "core-team"

client_id:
  type: str
  help: "Per-client identifier (e.g., idi, stevens, hope). Used in resource naming, config paths, tenant_id seeding."

deployment_namespace:
  type: str
  default: "{{ project_slug }}-{{ client_id }}-{{ environment_tier }}"
  help: "AWS resource prefix (e.g., portal-stevens-prod). Used in CDK stack naming, S3 bucket names, DynamoDB table names."

environment_tier:
  type: str
  choices:
    - dev
    - staging
    - prod
  default: dev
  help: "Deployment environment tier. Distinct from the 3-mode runtime contract (offline/local-live/prod). Controls CDK deployment target naming."

aws_region:
  type: str
  help: "AWS region for all resources"
  default: "us-east-1"

python_version:
  type: str
  help: "Minimum Python version"
  default: "3.12"

license:
  type: str
  help: "Project license"
  default: "MIT"
  choices:
    - "MIT"
    - "Apache-2.0"
    - "proprietary"

claude_code_model:
  type: str
  help: "Claude Code model ID for .claude/settings.json"
  default: "claude-opus-4-7"

metadata_store:
  type: str
  help: "Primary metadata store. PostgreSQL means Aurora PostgreSQL Serverless v2 + RDS Data API is recommended; standard RDS PostgreSQL is also supported with connection pooling, but RDS Data API is Aurora-only."
  default: "none"
  choices:
    - "none"
    - "dynamodb"
    - "postgres"

llm_provider:
  type: str
  help: "LLM provider"
  default: "none"
  choices:
    - "none"
    - "bedrock"
    - "openai"

include_frontend:
  type: bool
  help: "Include frontend module (apps/web/, React/Vite patterns)"
  default: false

include_infra:
  type: bool
  help: "Include infrastructure-as-code module (infra/)"
  default: false

include_observability:
  type: bool
  help: "Include observability module (OpenTelemetry, dashboards)"
  default: false

include_security:
  type: bool
  help: "Include security module (OWASP controls, redaction config)"
  default: false

include_evals:
  type: bool
  help: "Include evaluation harness (promptfoo)"
  default: true

include_e2e_tests:
  type: bool
  when: "{{ include_frontend }}"
  help: "Include Playwright browser-testing scaffold (apps/web/e2e/). Adds @playwright/test, wrapper scripts, and a skip-safe smoke test. Only available when include_frontend is enabled."
  default: false
  validator: "{% if include_e2e_tests and not include_frontend %}include_e2e_tests requires include_frontend=true — e2e tests target the web app in apps/web/{% endif %}"

_message_after_copy: |
  ✓ Project '{{ project_name }}' generated successfully!

  Next steps:
    1. cd {{ project_slug }}
    2. git init && git add . && git commit -m "Initialize from Projectsmith"
    3. uv venv
    4. uv lock
    5. uv sync --dev
    6. Open in Cursor or Claude Code — governance, commands, and verification are ready
    7. Fill all FILL placeholders with project-specific content
    8. Run verify-fast to confirm the scaffold is healthy

  See START_HERE.md for detailed onboarding.
