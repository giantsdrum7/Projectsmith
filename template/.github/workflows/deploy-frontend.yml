# Frontend Deployment — Build and deploy to S3/CloudFront
# Conditional on include_frontend=true (copier excludes this file otherwise)
# TODO: Add CDN invalidation configuration per client

name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: "20"
  AWS_REGION: "{{ aws_region }}"

jobs:
  deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    environment: {% raw %}${{ github.event.inputs.environment || 'dev' }}{% endraw %}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: {% raw %}${{ env.NODE_VERSION }}{% endraw %}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build
        env:
          VITE_API_BASE_URL: {% raw %}${{ secrets.API_BASE_URL }}{% endraw %}
          VITE_COGNITO_USER_POOL_ID: {% raw %}${{ secrets.COGNITO_USER_POOL_ID }}{% endraw %}
          VITE_COGNITO_CLIENT_ID: {% raw %}${{ secrets.COGNITO_CLIENT_ID }}{% endraw %}
          VITE_AWS_REGION: {% raw %}${{ env.AWS_REGION }}{% endraw %}
          VITE_CLIENT_CONFIG_URL: {% raw %}${{ secrets.CLIENT_CONFIG_URL }}{% endraw %}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: {% raw %}${{ secrets.AWS_DEPLOY_ROLE_ARN }}{% endraw %}
          aws-region: {% raw %}${{ env.AWS_REGION }}{% endraw %}

      - name: Sync to S3
        run: |
          aws s3 sync apps/web/dist/ s3://{% raw %}${{ secrets.FRONTEND_BUCKET_NAME }}{% endraw %}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "client-config*"
          aws s3 cp apps/web/dist/index.html s3://{% raw %}${{ secrets.FRONTEND_BUCKET_NAME }}{% endraw %}/index.html \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        if: {% raw %}${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}{% endraw %}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id {% raw %}${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}{% endraw %} \
            --paths "/*"
