{% if metadata_store == "none" %}
services: {}

# Add local service emulators here when the project chooses a metadata store.
{% else %}
services:
{% if metadata_store == "dynamodb" %}
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory"]
{% else %}
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: {{ project_slug }}
      POSTGRES_USER: {{ project_slug }}
      POSTGRES_PASSWORD: local-password
{% endif %}

  # SAM Local API (commented out — requires SAM CLI installed)
  # sam-local:
  #   build: .
  #   ports:
  #     - "3001:3001"
  #   environment:
  #     - AWS_SAM_LOCAL=true
{% if metadata_store == "dynamodb" %}
  #     - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
{% elif metadata_store == "postgres" %}
  #     - POSTGRES_HOST=postgres
  #     - POSTGRES_PORT=5432
  #     - POSTGRES_DATABASE={{ project_slug }}
{% endif %}
{% endif %}
